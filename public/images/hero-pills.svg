<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" fill="none">
  <defs>
    <filter id="soft-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="var(--hero-overscroll, #6b5144)" />

  <g fill="var(--hero-pills, #81695b)" filter="url(#soft-blur)">
    <rect x="40" y="-50" width="110" height="280" rx="55">
      <animate attributeName="y" values="-50; 20; -50" dur="6s" repeatCount="indefinite" />
    </rect>
    <rect x="210" y="70" width="110" height="240" rx="55">
      <animate attributeName="y" values="70; 10; 70" dur="7.5s" repeatCount="indefinite" />
    </rect>
    <rect x="380" y="-20" width="110" height="320" rx="55">
      <animate attributeName="y" values="-20; -80; -20" dur="5s" repeatCount="indefinite" />
    </rect>
    <rect x="550" y="60" width="110" height="260" rx="55">
      <animate attributeName="y" values="60; -10; 60" dur="10s" repeatCount="indefinite" />
    </rect>
    <rect x="720" y="-30" width="110" height="290" rx="55">
      <animate attributeName="y" values="-30; 40; -30" dur="15s" repeatCount="indefinite" />
    </rect>
    <rect x="890" y="40" width="110" height="250" rx="55">
      <animate attributeName="y" values="40; -20; 40" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
